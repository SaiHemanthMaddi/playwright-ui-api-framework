name: Nightly Tests

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      browser:
        description: "Browser to run on (manual runs)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit
      spec:
        description: "Spec to run (manual runs)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - tests/ui/login.spec.ts
          - tests/ui/products.spec.ts
          - tests/api/auth.api.spec.ts
          - tests/api/users.api.spec.ts

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PLAYWRIGHT_SERVICE_URL: ${{ vars.PLAYWRIGHT_SERVICE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Typecheck
        run: npm run typecheck

      - name: Build Test Command
        id: cmd
        shell: bash
        run: |
          set -euo pipefail
          TEST_CMD="npx playwright test --config=$GITHUB_WORKSPACE/playwright.service.config.ts --workers=3"
    
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BROWSER="${{ github.event.inputs.browser }}"
            SPEC="${{ github.event.inputs.spec }}"
      
            # Only add --project if not "all"
            if [[ "$BROWSER" != "all" ]]; then
            TEST_CMD="$TEST_CMD --project=$BROWSER"
            fi

            # "all" means run all browsers, so don't add --project flag at all
            if [[ "$SPEC" != "all" ]]; then
            TEST_CMD="$TEST_CMD $SPEC"
            fi
          fi
    
          echo "test_cmd=$TEST_CMD" >> "$GITHUB_OUTPUT"

      - name: Run Tests
        env:
          CI: "true"
        run: ${{ steps.cmd.outputs.test_cmd }}
