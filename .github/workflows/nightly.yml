name: Nightly Tests

on:
  schedule:
    # Run at 19:17 UTC daily.
    - cron: "17 19 * * *"
  workflow_dispatch:
    inputs:
      browser:
        description: "Browser to run on (manual runs)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - chromium
          - firefox
          - webkit
      spec:
        description: "Spec to run (manual runs)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - tests/ui/login.spec.ts
          - tests/ui/products.spec.ts
          - tests/api/auth.api.spec.ts
          - tests/api/users.api.spec.ts

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # REMOVED: Azure Login step (no longer needed for local runs)

      - name: Typecheck
        run: npm run typecheck

      - name: Build Test Command
        id: cmd
        shell: bash
        run: |
          set -euo pipefail
          
          # Use the standard config instead of the service config
          TEST_CMD="npx playwright test"
    
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BROWSER="${{ github.event.inputs.browser }}"
            SPEC="${{ github.event.inputs.spec }}"
      
            if [[ "$BROWSER" != "all" ]]; then
              TEST_CMD="$TEST_CMD --project=$BROWSER"
            fi

            if [[ "$SPEC" != "all" ]]; then
              TEST_CMD="$TEST_CMD $SPEC"
            fi
          fi
    
          echo "test_cmd=$TEST_CMD" >> "$GITHUB_OUTPUT"

      - name: Run Tests
        env:
          CI: "true"
        run: ${{ steps.cmd.outputs.test_cmd }}

      # Added artifact upload so you can actually see your results!
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30