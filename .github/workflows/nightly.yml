name: Nightly Tests

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Decide Test Scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          EVENT_NAME="${{ github.event_name }}"

          if [[ "$EVENT_NAME" == "schedule" || "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "test_cmd=npm test" >> "$GITHUB_OUTPUT"
            echo "reason=Scheduled/manual run -> full regression" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE=""
          HEAD="${{ github.sha }}"
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [[ "$EVENT_NAME" == "push" ]]; then
            BASE="${{ github.event.before }}"
          fi

          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "test_cmd=npm test" >> "$GITHUB_OUTPUT"
            echo "reason=No valid base SHA -> full regression" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t CHANGED_FILES < <(git diff --name-only "$BASE" "$HEAD")
          RUN_ALL=false
          SPECS=()

          for file in "${CHANGED_FILES[@]}"; do
            case "$file" in
              package.json|package-lock.json|playwright.config.ts|playwright.config.js|tsconfig.json|.github/workflows/nightly.yml)
                RUN_ALL=true
                ;;
              tests/*.spec.ts|tests/**/*.spec.ts|tests/*.spec.js|tests/**/*.spec.js)
                SPECS+=("$file")
                ;;
            esac
          done

          if [[ "$RUN_ALL" == "true" ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "test_cmd=npm test" >> "$GITHUB_OUTPUT"
            echo "reason=Core config/dependency change -> full regression" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ ${#SPECS[@]} -eq 0 ]]; then
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            echo "test_cmd=" >> "$GITHUB_OUTPUT"
            echo "reason=No changed Playwright specs" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          UNIQUE_SPECS=$(printf '%s\n' "${SPECS[@]}" | sort -u)
          TEST_CMD="npx playwright test"
          while IFS= read -r spec; do
            [[ -n "$spec" ]] && TEST_CMD="$TEST_CMD $spec"
          done <<< "$UNIQUE_SPECS"

          echo "run_tests=true" >> "$GITHUB_OUTPUT"
          echo "test_cmd=$TEST_CMD" >> "$GITHUB_OUTPUT"
          echo "reason=Changed spec scoped run" >> "$GITHUB_OUTPUT"

      - name: Typecheck
        if: steps.scope.outputs.run_tests == 'true'
        run: npm run typecheck

      - name: Run Tests
        if: steps.scope.outputs.run_tests == 'true'
        env:
          CI: "true"
        run: ${{ steps.scope.outputs.test_cmd }}

      - name: Skip Note
        if: steps.scope.outputs.run_tests != 'true'
        run: echo "Skipping Playwright run. Reason: ${{ steps.scope.outputs.reason }}"
